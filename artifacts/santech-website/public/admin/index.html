<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Santech CMS</title>
    <link rel="icon" href="/favicon.svg" />
    <style>
      :root { color-scheme: light; }
      body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      #loading {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        background: linear-gradient(135deg, #0c2340 0%, #1e3a5f 100%); color: white;
        flex-direction: column; gap: 1rem; font-weight: 300; letter-spacing: 0.1em;
      }
      #loading .spinner {
        width: 48px; height: 48px; border: 3px solid rgba(255,255,255,0.2);
        border-top-color: #f97316; border-radius: 50%; animation: spin 1s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="loading">
      <div class="spinner"></div>
      <div>SANTECH CMS</div>
    </div>
    <script src="https://unpkg.com/decap-cms@^3.8.4/dist/decap-cms.js"></script>
    <script>
      window.addEventListener('load', () => {
        const loader = document.getElementById('loading');
        if (loader) setTimeout(() => loader.remove(), 800);
      });
    </script>
  </body>
</html>
