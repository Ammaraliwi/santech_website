kind = "web"
previewPath = "/"
title = "Santech Trading Co."
version = "1.0.0"
id = "artifacts/santech-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22743

[services.development]
run = "pnpm --filter @workspace/santech-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/santech-website", "run", "build" ]
publicDir = "artifacts/santech-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22743"
BASE_PATH = "/"
